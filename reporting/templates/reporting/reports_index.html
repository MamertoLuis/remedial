{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{{ title }}</h1>
    <div class="list-group">
        {% for report in reports %}
            <a href="{% url report.url_name %}" class="list-group-item list-group-item-action">
                {{ report.name }}
            </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
